name: Auto Sync Upstream for YYDS

on:
  schedule:
    - cron: '0 3 * * *'   # 每天 UTC 3 点自动同步
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync upstream via native git
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 克隆自己的 fork
          git clone --no-local \
            https://x-access-token:${TOKEN}@github.com/${REPO}.git repo
          cd repo

          # 添加上游仓库
          upstream_repo="https://github.com/666OS/YYDS.git"
          git remote add upstream "$upstream_repo"
          git fetch upstream --tags

          echo "-----> 同步 main 分支"

          # 检查上游 main 是否存在
          if ! git show-ref --quiet refs/remotes/upstream/main; then
            echo "上游没有 main 分支，退出"
            exit 1
          fi

          # 切换或创建 main
          git checkout main 2>/dev/null || git checkout -b main upstream/main

          # 1. 备份 workflow 文件夹
          rm -rf /tmp/workflows-backup
          mkdir -p /tmp/workflows-backup
          cp -r .github/workflows /tmp/workflows-backup/ 2>/dev/null || true

          # 2. 强制重置为 upstream/main
          git fetch upstream
          git reset --hard upstream/main

          # 3. 恢复 workflow 文件
          mkdir -p .github/workflows
          cp -r /tmp/workflows-backup/workflows/. .github/workflows/ 2>/dev/null || true

          # 4. 提交并强制推送
          git add .github/workflows
          git diff --cached --quiet || git commit -m "restore workflows after upstream sync"
          git push origin main --force

          echo "main 分支同步完成！"
